<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Nunito Sans';
      src: url('fonts/NunitoSans-VariableFont.ttf') format('truetype');
      font-weight: 200 1000;
      font-style: normal;
      font-display: block;
    }

    /* ── CSS Variables: Light theme (default) ── */
    :root {
      --bg-page:           #f8fafc;
      --bg-surface:        #ffffff;
      --bg-input:          #f8fafc;
      --bg-subtle:         #f1f5f9;
      --text-primary:      #0f172a;
      --text-secondary:    #334155;
      --text-tertiary:     #475569;
      --text-muted:        #64748b;
      --text-faint:        #94a3b8;
      --border:            #e2e8f0;
      --border-light:      #f1f5f9;
      --border-medium:     #cbd5e1;
      --accent:            #2563eb;
      --accent-hover:      #1d4ed8;
      --accent-bg:         #eff6ff;
      --accent-text:       #1d4ed8;
      --error:             #ef4444;
      --error-border:      #fca5a5;
      --error-bg:          #fef2f2;
      --confirm-bg:        #fffbeb;
      --confirm-border:    #fde68a;
      --confirm-text:      #92400e;
      --wip-bg:            #fef3c7;
      --wip-text:          #d97706;
      --success:           #22c55e;
      --tooltip-bg:        #1e293b;
      --tooltip-text:      #ffffff;
      --scrollbar:         #e2e8f0;
      --toggle-off:        #cbd5e1;
      --badge-email-bg:    #f3e8ff; --badge-email-text:   #7c3aed;
      --badge-zuid-bg:     #dbeafe; --badge-zuid-text:    #2563eb;
      --badge-screen-bg:   #dcfce7; --badge-screen-text:  #16a34a;
      --badge-zpid-bg:     #fef3c7; --badge-zpid-text:    #d97706;
      --badge-viewed-bg:   #ecfeff; --badge-viewed-text:  #0e7490;
      --badge-phx-bg:      #ffedd5; --badge-phx-text:     #c2410c;
      --badge-dit-bg:      #fce7f3; --badge-dit-text:     #be185d;
    }

    /* ── Dark theme: system preference (Auto mode) ── */
    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) {
        --bg-page:           #0f172a;
        --bg-surface:        #1e293b;
        --bg-input:          #0f172a;
        --bg-subtle:         #334155;
        --text-primary:      #f1f5f9;
        --text-secondary:    #cbd5e1;
        --text-tertiary:     #b8cede;
        --text-muted:        #a8bccf;
        --text-faint:        #94a3b8;
        --border:            #334155;
        --border-light:      #1e293b;
        --border-medium:     #475569;
        --accent:            #3b82f6;
        --accent-hover:      #2563eb;
        --accent-bg:         #1e3a5f;
        --accent-text:       #93c5fd;
        --error:             #f87171;
        --error-border:      #ef4444;
        --error-bg:          #3b1515;
        --confirm-bg:        #2d1f07;
        --confirm-border:    #92400e;
        --confirm-text:      #fcd34d;
        --wip-bg:            #422006;
        --wip-text:          #fbbf24;
        --tooltip-bg:        #f1f5f9;
        --tooltip-text:      #0f172a;
        --scrollbar:         #334155;
        --toggle-off:        #475569;
        --badge-email-bg:    #3b1d5e; --badge-email-text:   #c4b5fd;
        --badge-zuid-bg:     #1e3a5f; --badge-zuid-text:    #93c5fd;
        --badge-screen-bg:   #14532d; --badge-screen-text:  #86efac;
        --badge-zpid-bg:     #422006; --badge-zpid-text:    #fbbf24;
        --badge-viewed-bg:   #0c2a33; --badge-viewed-text:  #67e8f9;
        --badge-phx-bg:      #431407; --badge-phx-text:     #fb923c;
        --badge-dit-bg:      #4a044e; --badge-dit-text:     #f0abfc;
      }
    }

    /* ── Dark theme: explicit override ── */
    html[data-theme="dark"] {
      --bg-page:           #0f172a;
      --bg-surface:        #1e293b;
      --bg-input:          #0f172a;
      --bg-subtle:         #334155;
      --text-primary:      #f1f5f9;
      --text-secondary:    #cbd5e1;
      --text-tertiary:     #b8cede;
      --text-muted:        #a8bccf;
      --text-faint:        #94a3b8;
      --border:            #334155;
      --border-light:      #1e293b;
      --border-medium:     #475569;
      --accent:            #3b82f6;
      --accent-hover:      #2563eb;
      --accent-bg:         #1e3a5f;
      --accent-text:       #93c5fd;
      --error:             #f87171;
      --error-border:      #ef4444;
      --error-bg:          #3b1515;
      --confirm-bg:        #2d1f07;
      --confirm-border:    #92400e;
      --confirm-text:      #fcd34d;
      --wip-bg:            #422006;
      --wip-text:          #fbbf24;
      --tooltip-bg:        #f1f5f9;
      --tooltip-text:      #0f172a;
      --scrollbar:         #334155;
      --toggle-off:        #475569;
      --badge-email-bg:    #3b1d5e; --badge-email-text:   #c4b5fd;
      --badge-zuid-bg:     #1e3a5f; --badge-zuid-text:    #93c5fd;
      --badge-screen-bg:   #14532d; --badge-screen-text:  #86efac;
      --badge-zpid-bg:     #422006; --badge-zpid-text:    #fbbf24;
      --badge-viewed-bg:   #0c2a33; --badge-viewed-text:  #67e8f9;
      --badge-phx-bg:      #431407; --badge-phx-text:     #fb923c;
      --badge-dit-bg:      #4a044e; --badge-dit-text:     #f0abfc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: inherit; }

    body {
      font-family: 'Nunito Sans', system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header — intentionally always dark ── */
    .header {
      background: #0f172a;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-icon {
      background: #3b82f6;
      padding: 6px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 2; }
    .header h1 { font-size: 15px; font-weight: 700; color: white; letter-spacing: -0.2px; }

    /* ── Body ── */
    .body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-height: 0; }
    .body::-webkit-scrollbar { width: 4px; }
    .body::-webkit-scrollbar-track { background: transparent; }
    .body::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

    /* ── Search Area ── */
    .search-area { background: var(--bg-surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }

    /* ── Tabs ── */
    .sp-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .sp-tab {
      flex: 1; padding: 9px 8px; font-size: 12px; font-weight: 700; text-align: center;
      cursor: pointer; border: none; background: none; color: var(--text-faint); transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .sp-tab:hover { color: var(--text-tertiary); }
    .sp-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: var(--bg-surface); }
    .sp-tab svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; }

    /* ── Search Content ── */
    .search-content { padding: 12px 14px 14px; }

    /* Mode selector */
    .modes { display: flex; gap: 4px; margin-bottom: 12px; }
    .mode-btn {
      flex: 1; padding: 5px 3px; font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.4px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-faint);
      border-radius: 7px; cursor: pointer; transition: all 0.15s;
    }
    .mode-btn:hover { color: var(--text-tertiary); border-color: var(--border-medium); }
    .mode-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-text); }
    .wip-tag { font-size: 8px; font-weight: 800; text-transform: uppercase; background: var(--wip-bg); color: var(--wip-text); padding: 1px 4px; border-radius: 3px; letter-spacing: 0.3px; margin-left: 3px; vertical-align: middle; }

    /* Input */
    .input-label { display: block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 5px; }
    .input-hint  { font-size: 10px; color: var(--text-faint); margin-bottom: 5px; }
    .input-wrap { position: relative; }
    .input-row { position: relative; margin-bottom: 4px; }
    .input-row input {
      width: 100%; padding: 9px 40px 9px 12px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 13px; background: var(--bg-input); color: var(--text-primary); outline: none; transition: all 0.15s;
    }
    .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
    .input-row input::placeholder { color: var(--text-faint); }
    .input-row input.has-error { border-color: var(--error-border); background: var(--error-bg); }
    .search-btn {
      position: absolute; right: 5px; top: 50%; transform: translateY(-50%); padding: 6px;
      background: var(--accent); border: none; border-radius: 7px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background 0.15s;
    }
    .search-btn:hover { background: var(--accent-hover); }
    .search-btn svg { width: 14px; height: 14px; fill: none; stroke: white; stroke-width: 2; }
    .error-msg { font-size: 10px; color: var(--error); padding-left: 2px; min-height: 14px; }

    /* Autocomplete dropdown */
    .ac-dropdown {
      position: absolute; top: calc(100% - 2px); left: 0; right: 0;
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 200; overflow: hidden;
    }
    .ac-item {
      width: 100%; padding: 8px 12px; font-size: 11px; text-align: left;
      background: none; border: none; cursor: pointer; color: var(--text-primary);
      display: block; transition: background 0.1s; border-top: 1px solid var(--border-light);
    }
    .ac-item:first-child { border-top: none; }
    .ac-item:hover, .ac-item.ac-active { background: var(--bg-subtle); }
    .ac-item-main { font-weight: 600; font-size: 11px; }
    .ac-item-sub { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

    /* Confirm bar */
    .confirm-bar {
      display: flex; align-items: center; gap: 7px; padding: 7px 10px;
      background: var(--confirm-bg); border: 1px solid var(--confirm-border); border-radius: 9px; margin-bottom: 8px;
    }
    .confirm-text { flex: 1; font-size: 11px; color: var(--confirm-text); }
    .confirm-text strong { font-weight: 700; }
    .confirm-bar button { padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s; }
    .confirm-yes { background: var(--accent); color: white; }
    .confirm-yes:hover { background: var(--accent-hover); }
    .confirm-no { background: var(--border); color: var(--text-tertiary); }
    .confirm-no:hover { background: var(--border-medium); }

    /* ── History Area ── */
    .history-area { padding: 16px; flex: 1; }

    /* ── Sections ── */
    .section + .section { margin-top: 20px; }
    .section-title {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 5px;
    }
    .section-title svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .section-header .section-title { margin-bottom: 0; }
    .section-clear { font-size: 10px; color: var(--text-faint); background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 3px; transition: color 0.15s; }
    .section-clear:hover { color: var(--error); }
    .section-clear svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2; }

    /* ── History items ── */
    .item {
      width: 100%; display: flex; flex-direction: column; gap: 2px; padding: 10px 12px;
      background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 10px;
      cursor: pointer; text-align: left; transition: background 0.15s; margin-bottom: 6px;
    }
    .item:last-child { margin-bottom: 0; }
    .item:hover { background: var(--bg-subtle); }
    .item-top { display: flex; align-items: center; justify-content: space-between; }
    .item-id { font-size: 13px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 6px; min-width: 0; }
    .item-sub { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 1px; margin-top: 2px; }
    .ext-icon { width: 14px; height: 14px; fill: none; stroke: var(--border-medium); stroke-width: 2; flex-shrink: 0; transition: stroke 0.15s; }
    .item:hover .ext-icon { stroke: var(--accent); }
    .copy-btn { position: relative; display: inline-flex; align-items: center; padding: 2px; border-radius: 3px; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
    .copy-btn:hover { background: var(--border); }
    .copy-icon { width: 14px; height: 14px; fill: none; stroke: var(--border-medium); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.15s; }
    .item:hover .copy-icon { stroke: var(--text-faint); }
    .copy-btn:hover .copy-icon { stroke: var(--text-tertiary); }
    .copy-btn.copy-ok .copy-icon { stroke: var(--success); }
    .copy-btn[data-tip]::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%); background: var(--tooltip-bg); color: var(--tooltip-text); font-size: 11px; white-space: nowrap; padding: 3px 7px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 10; }
    .copy-btn[data-tip]:hover::after { opacity: 1; }
    .open-btn { position: relative; display: inline-flex; align-items: center; padding: 2px 5px; border-radius: 3px; cursor: pointer; flex-shrink: 0; transition: background 0.15s; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; color: var(--text-tertiary); }
    .open-btn:hover { background: var(--border); color: var(--text-primary); }
    .open-btn[data-tip]::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%); background: var(--tooltip-bg); color: var(--tooltip-text); font-size: 11px; white-space: nowrap; padding: 3px 7px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 10; }
    .open-btn[data-tip]:hover::after { opacity: 1; }

    /* ── Badges ── */
    .badge { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.3px; flex-shrink: 0; }
    .badge-email      { background: var(--badge-email-bg);  color: var(--badge-email-text); }
    .badge-zuid       { background: var(--badge-zuid-bg);   color: var(--badge-zuid-text); }
    .badge-screenname { background: var(--badge-screen-bg); color: var(--badge-screen-text); }
    .badge-zpid       { background: var(--badge-zpid-bg);   color: var(--badge-zpid-text); }
    .badge-viewed     { background: var(--badge-viewed-bg); color: var(--badge-viewed-text); }
    .badge-phx        { background: var(--badge-phx-bg);    color: var(--badge-phx-text); }
    .badge-dit        { background: var(--badge-dit-bg);    color: var(--badge-dit-text); }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 20px; border: 2px dashed var(--border); border-radius: 10px; font-size: 12px; color: var(--text-faint); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <h1>Zillow Admin Tools</h1>
  </div>

  <div class="body">

    <!-- Search area -->
    <div class="search-area">

      <!-- Tabs -->
      <div class="sp-tabs" id="sp-tabs">
        <button class="sp-tab" id="sp-tab-zpid">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Listing Search
        </button>
        <button class="sp-tab active" id="sp-tab-imp">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Impersonate
        </button>
      </div>

      <div class="search-content">
        <!-- Mode selector -->
        <div class="modes" id="sp-mode-row">
          <button class="mode-btn active" data-mode="zuid">ZUID</button>
          <button class="mode-btn" data-mode="email">Email</button>
          <button class="mode-btn" data-mode="screenname">Screen</button>
          <button class="mode-btn" data-mode="auto">Auto<span class="wip-tag">WIP</span></button>
        </div>

        <!-- Confirm bar -->
        <div class="confirm-bar hidden" id="sp-confirm-bar">
          <span class="confirm-text" id="sp-confirm-text"></span>
          <button class="confirm-yes" id="sp-confirm-yes">Go</button>
          <button class="confirm-no" id="sp-confirm-no">Cancel</button>
        </div>

        <!-- Impersonate input (hidden on listing tab) -->
        <div id="sp-imp-search">
          <label class="input-label" id="sp-input-label">Email, ZUID, or Screen Name</label>
          <div class="input-row">
            <input type="text" id="sp-input" placeholder="Email, ZUID, or Screen Name" autocomplete="off">
            <button class="search-btn" id="sp-go-btn">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
          </div>
          <div class="error-msg" id="sp-error-msg"></div>
        </div>

        <!-- Listing Search — two separate inputs (hidden on impersonate tab) -->
        <div id="sp-listing-search" class="hidden">
          <div class="modes" id="sp-listing-mode-row">
            <button class="mode-btn active" data-lmode="zillow">Zillow</button>
            <button class="mode-btn" data-lmode="phx">PHX</button>
            <button class="mode-btn" data-lmode="dit">DIT</button>
          </div>
          <label class="input-label">ZPID</label>
          <div class="input-row" style="margin-bottom:2px;">
            <input type="text" id="sp-zpid-input" placeholder="e.g. 29122711" inputmode="numeric" autocomplete="off">
            <button class="search-btn" id="sp-zpid-go-btn">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
          </div>
          <div class="error-msg" id="sp-zpid-error-msg"></div>
          <div id="sp-addr-search">
            <label class="input-label" style="margin-top:1px; display:block;">Address</label>
            <div class="input-wrap">
              <div class="input-row">
                <input type="text" id="sp-addr-input" placeholder="e.g. 123 Main St, Seattle" autocomplete="off">
                <button class="search-btn" id="sp-addr-go-btn">
                  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
              </div>
              <div class="ac-dropdown hidden" id="sp-ac-dropdown"></div>
            </div>
            <div class="error-msg" id="sp-addr-error-msg"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- History area -->
    <div class="history-area" id="sp-history"></div>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
