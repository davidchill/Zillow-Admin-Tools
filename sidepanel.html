<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Nunito Sans';
      src: url('fonts/NunitoSans-VariableFont.ttf') format('truetype');
      font-weight: 200 1000;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: inherit; }

    body {
      font-family: 'Nunito Sans', system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: #0f172a;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-icon {
      background: #3b82f6;
      padding: 6px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: white;
      stroke-width: 2;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.2px;
    }

    /* ── Body ── */
    .body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .body::-webkit-scrollbar { width: 4px; }
    .body::-webkit-scrollbar-track { background: transparent; }
    .body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

    /* ── Sections ── */
    .section + .section { margin-top: 20px; }

    .section-title {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #64748b;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .section-title svg {
      width: 11px;
      height: 11px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    /* ── History items ── */
    .item {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 12px;
      background: white;
      border: 1px solid #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
      margin-bottom: 6px;
    }
    .item:last-child { margin-bottom: 0; }
    .item:hover { background: #f1f5f9; }

    .item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .item-id {
      font-size: 13px;
      font-weight: 700;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .item-sub {
      font-size: 11px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-left: 1px;
      margin-top: 2px;
    }
    .ext-icon {
      width: 12px;
      height: 12px;
      fill: none;
      stroke: #cbd5e1;
      stroke-width: 2;
      flex-shrink: 0;
      transition: stroke 0.15s;
    }
    .item:hover .ext-icon { stroke: #3b82f6; }

    /* ── Badges ── */
    .badge {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .badge-email      { background: #f3e8ff; color: #7c3aed; }
    .badge-zuid       { background: #dbeafe; color: #2563eb; }
    .badge-screenname { background: #dcfce7; color: #16a34a; }
    .badge-zpid       { background: #fef3c7; color: #d97706; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 20px;
      border: 2px dashed #e2e8f0;
      border-radius: 10px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <h1>Zillow Admin Tools</h1>
  </div>

  <div class="body" id="panel-body"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
